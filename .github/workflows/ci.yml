name: CI

on:
  pull_request:
  push:
    branches:
      - 'master'
    tags:
      - '*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout LiveSplit
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch history
        run: git fetch --prune --unshallow --no-recurse-submodules

      - name: Checkout head_ref
        if: ${{ github.head_ref != '' }}
        run: git checkout -b ${{ github.head_ref }} || git checkout ${{ github.head_ref }}

      - name: Set up .NET environment
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build LiveSplit
        run: >
          dotnet build
          -v m
          -c Release
          -p:DebugType=None
          .\LiveSplit.sln

      - name: Run tests
        run: >
          dotnet test
          -v m
          -c Release
          --no-restore --no-build
          .\LiveSplit.sln

      - name: Get short SHA
        id: short_sha
        run: echo "value=$('${{ github.sha }}'.Substring(0, 7))" >> $env:GITHUB_OUTPUT

      - name: Zip Transparent LiveSplit
        run: 7z a Transparent_LiveSplit_${{ steps.short_sha.outputs.value }}.zip .\bin\Release\*

      - name: Create a new tag and release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.short_sha.outputs.value }}
          name: Transparent LiveSplit (${{ steps.short_sha.outputs.value }})
          body: |
            Automated release for Transparent LiveSplit.
            Commit: ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: Transparent_LiveSplit_${{ steps.short_sha.outputs.value }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
